<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 70" width="100%" height="100%">
  <!-- Definitions for Gradients -->
  <defs>
    <!-- Sky skyblue background (optional, logo is transparent) -->
    <!-- Droplet gradients -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7e5f" />
      <stop offset="100%" stop-color="#feb47b" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9c80e" />
      <stop offset="100%" stop-color="#f8a5c2" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ed573" />
      <stop offset="100%" stop-color="#7bed9f" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4757" />
      <stop offset="100%" stop-color="#ff6b81" />
    </linearGradient>
    
    <!-- 3D Book Gradient -->
    <linearGradient id="bookCover" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#004b87" />
      <stop offset="40%" stop-color="#006bb6" />
      <stop offset="100%" stop-color="#1e90ff" />
    </linearGradient>
    <linearGradient id="bookPage" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
  </defs>

  <!-- Group for Logo Mark -->
  <g transform="translate(10, 5)">
    <!-- 1. The Splash (Petals) from Poster -->
    <!-- Top-Left Orange Petal -->
    <path d="M 22 25 C 10 15, 8 30, 22 35 C 22 35, 23 28, 22 25 Z" fill="url(#orangeGrad)" />
    <!-- Top-Right Yellow Petal -->
    <path d="M 26 22 C 26 8, 38 12, 30 28 C 30 28, 27 24, 26 22 Z" fill="url(#yellowGrad)" />
    <!-- Bottom-Left Green Petal -->
    <path d="M 20 37 C 8 42, 14 55, 24 43 C 24 43, 21 40, 20 37 Z" fill="url(#greenGrad)" />
    
    <!-- 2. The 3D Blue Book -->
    <!-- Shadow -->
    <path d="M 33 46 L 53 50 L 53 14 L 33 10 Z" fill="rgba(0,0,0,0.15)" />
    <!-- Page block (bottom/top edge) -->
    <path d="M 31 43 L 34 44 L 34 8 L 31 7 Z" fill="#e2e8f0" />
    <!-- Spine -->
    <path d="M 30 6 L 33 7 L 33 44 L 30 43 C 28.5 43, 28.5 6, 30 6 Z" fill="#003a6b" />
    <!-- Book Front Cover -->
    <path d="M 33 7 L 51 11 L 51 47 L 33 43 Z" fill="url(#bookCover)" />
    <!-- Inner Pages (side thickness) -->
    <path d="M 51 11 L 53 12 L 53 48 L 51 47 Z" fill="url(#bookPage)" />
    <!-- Book Back Cover -->
    <path d="M 53 12 L 54 12.2 L 54 48.2 L 53 48 Z" fill="#004b87" />
    
    <!-- White miniature text inside book cover (representing Centre Tonaroz) -->
    <text x="42" y="20" font-family="'Inter', sans-serif" font-weight="800" font-size="5" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">C</text>
    <text x="42" y="26" font-family="'Inter', sans-serif" font-weight="800" font-size="5" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">T</text>
  </g>

  <!-- Group for Text Branding -->
  <g transform="translate(75, 12)">
    <!-- French Text: Centre Tonaroz -->
    <text x="0" y="20" font-family="'Outfit', 'Inter', sans-serif" font-size="19" font-weight="700" fill="#1e293b" letter-spacing="-0.02em">
      Centre
      <!-- Individual styled letters for Tonaroz -->
      <tspan fill="#f9c80e" font-weight="800" dx="5">T</tspan>
      <tspan fill="#1e90ff" font-weight="800">o</tspan>
      <tspan fill="#ff4757" font-weight="800">n</tspan>
      <tspan fill="#2ed573" font-weight="800">a</tspan>
      <tspan fill="#ff4757" font-weight="800">r</tspan>
      <tspan fill="#f9c80e" font-weight="800">o</tspan>
      <tspan fill="#2ed573" font-weight="800">z</tspan>
    </text>

    <!-- Arabic Title: مركز توناروز -->
    <text x="235" y="20" font-family="'Cairo', 'Amiri', sans-serif" font-size="16" font-weight="800" text-anchor="end" direction="rtl" xml:lang="ar">
      <tspan fill="#1e90ff">م</tspan>
      <tspan fill="#ff4757">ر</tspan>
      <tspan fill="#2ed573">ك</tspan>
      <tspan fill="#ff4757">ز</tspan>
      <tspan fill="#ffffff" font-size="2"> </tspan>
      <tspan fill="#1e90ff">ت</tspan>
      <tspan fill="#ff4757">و</tspan>
      <tspan fill="#2ed573">ن</tspan>
      <tspan fill="#2ed573">ا</tspan>
      <tspan fill="#ff4757">ر</tspan>
      <tspan fill="#ff4757">و</tspan>
      <tspan fill="#2ed573">ز</tspan>
    </text>

    <!-- Subtitle: Soft Skills · Langues -->
    <text x="0" y="38" font-family="'Inter', sans-serif" font-size="8.5" font-weight="600" fill="#64748b" letter-spacing="0.05em">
      Soft Skills · Langues &amp; Communication
    </text>
  </g>
</svg>
